<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Fish AR</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<style>
body{
margin:0;
overflow:hidden;
}
</style>

</head>

<body>

<a-scene embedded arjs>

<a-assets>
<img id="fish" src="sakaana.png">
</a-assets>

<a-marker preset="hiro">

<a-image
src="#fish"
position="0 0.5 0"
width="1"
height="0.6"
>
</a-image>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

</body>
</html>
